<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>MYSKME · 远征录 — 笼中剑</title>
<meta name="theme-color" content="#1a1c2c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="远征录">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%231a1c2c' stroke='%23ffcd75' stroke-width='4'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='28' font-family='Arial Black' font-weight='900' fill='%23ffcd75'%3EM%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#1a1c2c; --bg2:#29366f; --panel:#12131f;
  --ink:#f4f4f4; --ink2:#94b0c2; --ink3:#566c86;
  --gold:#ffcd75; --gold2:#ffe5b0; --red:#ef4d4d; --green:#38b764;
  --blue:#41a6f6; --purple:#b07ce8; --orange:#ef7d57;
  --serif:"Noto Serif SC","Songti SC","STSong",serif;
  --mono:ui-monospace,Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}/* overscroll:none 防安卓滚动链/下拉刷新连带收放地址栏 */
body{background:#0c0d16;font-family:var(--serif);color:var(--ink);user-select:none;-webkit-user-select:none}
canvas{display:block;image-rendering:auto;touch-action:none}/* touch-action:none 关键——安卓上拖摇杆/点击移动时禁掉浏览器默认滚动手势(passive监听拦不住),根治"移动带动页面上下抖+地址栏收放";iOS本就靠position:fixed克制,故你看不到 */
/* HD 图标统一锐化：源图(96/128px)恒大于显示尺寸=永远缩小，crisp-edges 锐而不糊不块；覆盖 HUD 技能/背包/茶/闪避图标 + mbi 菜单图标(.crisp)，竖横屏同效 */
.sk img,#dashbox img,.mbtn img,#dashbtn img,img.crisp{image-rendering:-webkit-optimize-contrast;image-rendering:crisp-edges}
#game{position:fixed;inset:0;touch-action:none}
.mbtn,#dashbtn,#joy,#goBtn,#mysmapBtn,#hint,#hud{touch-action:none}/* 控件同禁默认手势(这些永不需要滚动;弹层.overlay/.ov-inner不动,保留菜单滚动) */
/* 扫描线 + 暗角 */
#crt{position:fixed;inset:0;pointer-events:none;z-index:5;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.13) 0 1px,transparent 1px 3px)}
#vig{position:fixed;inset:0;pointer-events:none;z-index:5;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(5,6,12,.6) 100%)}
#flash{position:fixed;inset:0;pointer-events:none;z-index:40;opacity:0}
#lowhp{position:fixed;inset:0;pointer-events:none;z-index:39;opacity:0;transition:opacity .22s;box-shadow:inset 0 0 110px 36px rgba(190,28,28,.5),inset 0 0 36px rgba(150,0,0,.38)}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:min(86vw,400px);margin:0 auto;background:rgba(0,0,0,.32);padding:9px;border-radius:14px;touch-action:none}
.mcell{aspect-ratio:1;border-radius:9px;background:rgba(255,255,255,.05);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.mtile{position:relative;animation:mpop .13s ease-out;box-shadow:0 2px 0 rgba(0,0,0,.25) inset,0 0 10px -2px var(--mc,transparent)}
.mtile::before{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(58% 58% at 50% 46%,color-mix(in srgb,var(--mc,#fff) 55%,#fff) 0%,transparent 68%);opacity:.5;mix-blend-mode:screen;pointer-events:none;z-index:0}

.mtile::after{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(135% 105% at 26% 15%,rgba(255,255,255,.30),transparent 58%);pointer-events:none;z-index:0}
.cozy-room{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;max-width:min(94vw,460px);margin:0 auto;background:linear-gradient(165deg,#2c2440,#191527);border:2px solid rgba(255,205,117,.22);border-radius:12px;padding:8px}
.cozy-cell{aspect-ratio:1;border-radius:6px;background:rgba(255,255,255,.035);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .1s}
.cozy-cell:hover{background:rgba(255,205,117,.12)}
.cozy-cell svg{width:90%;height:90%}
.cozy-pal{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:480px;margin:12px auto 0}
.cozy-pi{width:56px;padding:5px 2px 4px;border-radius:9px;background:var(--bg2);border:2px solid #2a2f4a;cursor:pointer;text-align:center;line-height:1.2}
.cozy-pi.sel{border-color:var(--gold);box-shadow:0 0 8px rgba(255,205,117,.4)}
.cozy-pi svg{width:26px;height:26px;display:block;margin:1px auto}
.cozy-dyes{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px auto 0;max-width:380px}
.cozy-dye{width:40px;height:40px;border-radius:9px;cursor:pointer;border:2px solid transparent}
.cozy-dye.sel{border-color:#fff;box-shadow:0 0 7px rgba(255,255,255,.6)}
.mtile b,.mtile i{position:relative;z-index:1}
.mtile b{font-family:var(--mono);font-weight:700;font-size:clamp(15px,5.4vw,26px);line-height:1;text-shadow:0 1px 3px rgba(0,0,0,.92),0 0 7px rgba(0,0,0,.7)}
.mtile i{font-style:normal;font-family:var(--serif);font-size:10.5px;opacity:.92;margin-top:1px;text-shadow:0 1px 2px rgba(0,0,0,.9)}
@keyframes mpop{from{transform:scale(.8)}to{transform:scale(1)}}
#goBtn{position:fixed;top:72px;right:14px;z-index:13;display:none;align-items:center;gap:6px;font-family:var(--serif);font-weight:700;font-size:13px;letter-spacing:.18em;color:#1a1c2c;background:linear-gradient(180deg,#ffd98a,#ffcd75);border:0;border-bottom:4px solid #b8862f;border-radius:11px;padding:8px 15px 7px;cursor:pointer;box-shadow:0 5px 16px rgba(255,205,117,.32);animation:goPulse 1.9s ease-in-out infinite}#goBtn:active{transform:translateY(3px);border-bottom-width:2px}@keyframes goPulse{0%,100%{box-shadow:0 6px 22px rgba(255,205,117,.30)}50%{box-shadow:0 6px 30px rgba(255,205,117,.6)}}@media(max-width:560px){#goBtn{top:calc(220px + env(safe-area-inset-top));right:calc(10px + env(safe-area-inset-right));bottom:auto;font-size:13px;letter-spacing:.14em;gap:5px;padding:7px 13px 6px}}.menu-hi{border:2px solid var(--gold)!important;box-shadow:0 0 0 1px rgba(255,205,117,.25)}@keyframes menuPulseHi{0%,100%{box-shadow:0 0 0 1px rgba(255,205,117,.3)}50%{box-shadow:0 0 14px 2px rgba(255,205,117,.85)}}.menu-pulse{animation:menuPulseHi 1.1s ease-in-out infinite}.reddot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ff3b3b;margin-left:5px;vertical-align:1px;box-shadow:0 0 6px rgba(255,59,59,.9)}
#ovHero .hp-card{max-width:330px;text-align:center}
#ovHero .hp-pic{width:80px;height:112px;object-fit:cover;object-position:center 16%;border-radius:10px;border:1.5px solid var(--gold);margin-bottom:4px;background:#0d1018}
#ovHero .hp-name{font-size:19px;font-weight:700;color:#fff}
#ovHero .hp-star{color:var(--gold);font-size:14px}
#ovHero .hp-role{font-size:11.5px;color:#7fd3ff;margin-top:2px}
#ovHero .hp-stat{font-size:13px;color:#cdd6e6;margin:8px 0 2px}
#ovHero .hp-stat b{color:var(--gold)}
#ovHero .hp-lbl{text-align:left;font-size:11.5px;color:var(--gold);margin:12px 0 4px;border-left:3px solid var(--gold);padding-left:7px}
#ovHero .hp-it{display:flex;align-items:center;gap:6px;text-align:left;font-size:11.5px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06)}
#ovHero .hp-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
#ovHero .hp-it .hp-d{opacity:.62;flex:1;font-size:10.5px}
#ovHero .hp-x{background:#3a1f28;border:1px solid rgba(255,107,107,.5);color:#ff9b9b;border-radius:5px;font:12px var(--serif);padding:7px 12px;min-height:34px;cursor:pointer;flex:0 0 auto}
#ovHero .hp-empty{font-size:11px;opacity:.5;text-align:left;padding:5px 0}
#ovHero .hp-btns{display:flex;flex-direction:column;gap:7px;margin-top:14px}
#ovHero .hp-btns .pbtn{margin:0;width:100%}
#menusk{position:relative}
#menusk.has-new::after{content:'';position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:50%;background:#ff3b3b;box-shadow:0 0 6px rgba(255,59,59,.95)}
#flash.go-white{background:rgba(255,255,255,.75);animation:flashOut .35s ease-out}
#flash.go-red{background:rgba(239,77,77,.5);animation:flashOut .45s ease-out}
#flash.go-purple{background:rgba(176,124,232,.5);animation:flashOut .5s ease-out}
@keyframes flashOut{0%{opacity:.9}100%{opacity:0}}
body.shaking #game{animation:shake .35s cubic-bezier(.36,.07,.19,.97)}
@keyframes shake{10%,90%{transform:translate(-3px,2px)}30%,70%{transform:translate(5px,-3px)}50%{transform:translate(-4px,3px)}}

/* ===== HUD ===== */
#hud{position:fixed;top:0;left:0;right:0;z-index:10;display:none;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
  pointer-events:none;font-family:var(--mono)}
#hud.on{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap}
body.touch #hud.on{flex-wrap:nowrap;gap:8px}
.hud-box{background:rgba(12,13,22,.82);border:3px solid #000;box-shadow:0 3px 0 #000;padding:6px 12px;display:flex;align-items:center;gap:8px}
#hpwrap{min-width:190px;flex-direction:column;align-items:stretch;gap:4px}
#hpname{font-family:var(--serif);font-size:13px;letter-spacing:.18em;color:var(--gold);display:flex;justify-content:space-between}
#hpname b{color:var(--ink);font-weight:400}
#hpbar{height:12px;background:#000;position:relative;overflow:hidden}
#hpbar i{display:block;height:100%;background:linear-gradient(180deg,#5fe09a,var(--green));transition:width .25s steps(6)}
#hpbar.low i{background:linear-gradient(180deg,#ff8a8a,var(--red))}
#hpnum{font-size:11px;color:var(--ink2);text-align:right}
.hud-stat{font-size:14px;color:var(--gold);letter-spacing:.05em}
.hud-stat small{color:var(--ink2);font-size:10px;display:block;letter-spacing:.2em}
#depthbox{color:var(--purple)}
#dashbox{width:54px;height:54px;justify-content:center;position:relative}
/* 技能位 & 茶壶 */
#skbox{gap:6px}
.sk{width:42px;height:42px;border:2px solid #3a3f5c;background:#0c0d16;display:flex;align-items:center;justify-content:center;
  font-size:19px;position:relative;color:var(--ink2)}
.sk.ready{border-color:var(--gold);box-shadow:0 0 10px rgba(255,205,117,.35)}
.sk.empty{opacity:.35}
.sk .cdn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(10,11,18,.72);color:var(--gold2);font-family:var(--mono);font-size:14px;font-weight:700}
.skgl{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--gold);font-style:normal;text-shadow:0 0 8px rgba(255,205,117,.5)}
.sk .key{position:absolute;top:-9px;left:-7px;font-size:9px;font-family:var(--mono);color:#1a1c2c;
  background:var(--gold);padding:0 4px;font-weight:700}
body.touch .sk .key{display:none}
body.touch #invsk,body.touch #menusk{min-width:44px;min-height:44px}
#flasksk.ready{border-color:var(--green);box-shadow:0 0 10px rgba(56,183,100,.4)}
#flasksk .key{background:var(--green)}
/* 触屏技能按钮 */
.mbtn{position:fixed;z-index:20;display:none;border-radius:50%;align-items:center;justify-content:center;font-size:22px}
body.touch .mbtn{display:flex}
#mysmapBtn{position:fixed;left:calc(12px + env(safe-area-inset-left));top:calc(92px + env(safe-area-inset-top));z-index:21;width:46px;height:46px;border-radius:11px;background:rgba(10,11,20,.82);border:1.5px solid #5ad8d8;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.mn-reach{animation:mnPulse 1.1s ease-in-out infinite}@keyframes mnPulse{0%,100%{opacity:1}50%{opacity:.5}}
#skbtn0{right:104px;bottom:calc(100px + env(safe-area-inset-bottom));width:56px;height:56px;background:rgba(255,205,117,.14);border:3px solid var(--gold);color:var(--gold);opacity:.92}
#skbtn1{right:22px;bottom:calc(128px + env(safe-area-inset-bottom));width:56px;height:56px;background:rgba(255,205,117,.14);border:3px solid var(--gold);color:var(--gold);opacity:.92}
/* 家园也显示技能/茶/冲刺键，新玩家学操作：技能/茶在城里是安全空操作，冲刺可用 */
#flaskbtn{font-family:var(--serif);right:112px;bottom:calc(24px + env(safe-area-inset-bottom));width:50px;height:50px;background:rgba(56,183,100,.14);border:3px solid var(--green);color:var(--green);opacity:.92}
#dashring{position:absolute;inset:4px;border:2px solid var(--blue);opacity:.25}
#dashbox.ready #dashring{opacity:1;box-shadow:0 0 10px var(--blue)}
#dashico{font-size:20px}
/* ===== HUD 线性图标统一(#1, 无新美术) ===== */
#hud svg,.mbtn svg,#dashbtn svg{stroke-width:2!important;stroke-linecap:round;stroke-linejoin:round}
#goldbox svg{stroke:var(--gold)!important}
#crybox svg{stroke:var(--purple)!important}
#depthbox svg{stroke:var(--ink2)!important}
#dashbox svg,#dashbtn svg{stroke:var(--blue)!important}
#flasksk svg,#flaskbtn svg{stroke:var(--green)!important}
#menusk svg,#invsk svg,#sk0 svg,#sk1 svg{stroke:var(--gold)!important}
#goldbox svg,#crybox svg,#depthbox svg{width:22px;height:22px;padding:3px;box-sizing:content-box;background:rgba(8,9,16,.85);border:1.5px solid rgba(255,205,117,.18);border-radius:7px;margin-right:2px;vertical-align:middle!important}
#crybox svg{border-color:rgba(176,124,232,.22)}
#depthbox svg{border-color:rgba(148,176,194,.18)}
.sk{border-radius:9px;border-color:rgba(255,205,117,.16)}
.sk.empty{border-color:rgba(148,176,194,.14)}
#dashbox{border-radius:11px}
.mbtn,#dashbtn{box-shadow:0 0 0 1px rgba(0,0,0,.35),inset 0 0 0 1px rgba(255,205,117,.10)}
.mbtn:active,#dashbtn:active{transform:scale(.92)}
.mbtn.cooling,#dashbtn.cooling{opacity:.42!important;filter:grayscale(.55)}
.mgp{font-size:11px!important;padding:11px 12px!important;margin:0!important}
#mgChoice{position:fixed;inset:0;z-index:38;display:none;align-items:center;justify-content:center;background:rgba(8,9,16,.82);padding:24px}
#mgChoice.on{display:flex;animation:ovIn .24s cubic-bezier(.16,.84,.34,1) both}
.mgchoice-card{width:100%;max-width:340px;background:rgba(15,17,30,.99);border:1.5px solid var(--gold);border-radius:16px;padding:20px 16px 14px;box-shadow:0 14px 44px rgba(0,0,0,.6),0 0 0 4px rgba(255,205,117,.08)}
.mgchoice-t{color:var(--gold);font-family:var(--serif);font-size:16px;letter-spacing:.1em;margin-bottom:14px}
.mgchoice-b{display:flex!important;flex-direction:column;gap:3px;width:100%;margin:9px 0!important;padding:13px 14px!important;text-align:center;align-items:center}
.mgchoice-b b{color:var(--gold);font-size:16px;line-height:1.2}
.mgchoice-b span{font-size:11px;opacity:.82;font-weight:400;line-height:1.3}
.mcell.tgt{outline:2px solid var(--gold);cursor:pointer}
.doodle{display:grid;grid-template-columns:repeat(16,1fr);gap:0;line-height:0;border:1px solid rgba(255,205,117,.2);background:#0c0d16}
.doodle i{display:block;aspect-ratio:1}
.dgrid{display:grid;grid-template-columns:repeat(16,1fr);gap:1px;background:#000;border:2px solid var(--gold);width:min(288px,86vw);aspect-ratio:1;margin:8px auto;touch-action:none}
.dcell{display:block;background:transparent;cursor:crosshair}
.dpal{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:10px}
.dsw{display:block;width:26px;height:26px;border-radius:6px;border:2px solid #000;cursor:pointer}
.dsw.on{border-color:var(--gold);box-shadow:0 0 8px rgba(255,205,117,.6)}
.namecard{display:flex;gap:12px;align-items:center;background:rgba(12,13,22,.6);border:2px solid var(--gold);border-radius:10px;padding:10px 14px}
.nc-doodle{flex:0 0 auto;line-height:0}
.nc-name{font-family:var(--serif);color:var(--gold);font-size:15px;font-weight:700;word-break:break-all}
.nc-stat{font-size:11px;color:var(--ink2);margin-top:4px}
.dcard{display:flex;justify-content:center;margin-bottom:10px}
.dtools{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:8px 0}
.dtl{font-size:12px!important;padding:7px 12px 5px!important;margin:0!important}
.dtpl{display:flex;gap:5px;justify-content:center;align-items:center;flex-wrap:wrap;margin:2px 0 8px}
.dtpl-lb{font-size:11px;color:var(--ink2);margin-right:2px}
.dtb{font-size:11px!important;padding:6px 9px 4px!important}
.pbtn.lk{font-size:13px!important;padding:7px 18px 5px!important;display:inline-flex;align-items:center;gap:5px}
.pbtn.lk.liked{border-color:#ff5a7a;color:#ff9ab8}
.nc-sig{font-size:11px;color:var(--gold2);font-style:italic;margin-top:3px;word-break:break-all}
.lbd{display:inline-block;width:24px;height:24px;flex:0 0 auto;border-radius:3px;overflow:hidden;line-height:0}
.lbd .doodle{width:24px!important;height:24px!important;border:0!important}
.mode-list{display:flex;flex-direction:column;gap:12px;max-width:480px;margin:0 auto}
.mode-card{background:rgba(12,13,22,.6);border:2px solid var(--mc,#ffcd75);border-left-width:6px;border-radius:12px;padding:14px 18px;text-align:left;cursor:pointer;transition:transform .12s,background .12s}
.pbtn.sm{font-size:12px;letter-spacing:.08em;padding:8px 16px 6px;border-bottom-width:4px}
.tbtn.go{font-size:15px;letter-spacing:.14em;padding:11px 22px 9px;border-bottom-width:5px;box-shadow:0 0 16px rgba(255,205,117,.35)}
@media(max-width:760px){.tbtn.go{font-size:13px;padding:9px 14px 7px}}
.mode-card:hover{background:rgba(255,205,117,.06);transform:translateX(3px)}
.mode-tag{font-size:10px;letter-spacing:.2em;color:var(--mc,#ffcd75);opacity:.85}
.mode-name{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--mc,#ffcd75);letter-spacing:.1em;margin:2px 0}
.mode-desc{font-size:11.5px;color:var(--ink2);line-height:1.6}
.t-modes{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:344px;margin:0 auto}
.tmode{background:rgba(12,13,22,.6);border:1.5px solid var(--mc,#ffcd75);border-left-width:5px;border-radius:10px;padding:9px 11px;text-align:left;cursor:pointer;display:flex;flex-direction:column;gap:2px;transition:transform .12s,background .12s;font-family:inherit}
.tmode:hover:not(:disabled){background:rgba(255,205,117,.07);transform:translateY(-1px)}
.tmode:disabled{opacity:.42;cursor:default}
.tmode b{font-family:var(--serif);font-size:15px;color:var(--mc,#ffcd75);letter-spacing:.05em;line-height:1.2}
.tmode span{font-size:10px;color:var(--ink2);line-height:1.35}
#hint{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:auto;cursor:pointer;
  font-size:14px;letter-spacing:.2em;color:var(--gold);background:rgba(12,13,22,.85);border:3px solid #000;
  box-shadow:0 3px 0 #000;padding:8px 20px;display:none;font-family:var(--serif);text-align:center;line-height:1.6}
#hint.on{display:block;animation:hintPop .25s steps(3)}
@keyframes hintPop{from{transform:translateX(-50%) translateY(8px)}to{transform:translateX(-50%) translateY(0)}}
#bossbar{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:10;width:min(560px,86vw);display:none;pointer-events:none}
#bossbar.on{display:block}
#bossCard{position:fixed;left:50%;top:42%;transform:translate(-50%,-50%) scale(.72);z-index:14;display:none;opacity:0;pointer-events:none;text-align:center;transition:opacity .3s ease,transform .3s cubic-bezier(.2,.9,.3,1.2)}
#bossCard.on{display:block;opacity:1;transform:translate(-50%,-50%) scale(1)}
#bossCard img{width:150px;border-radius:12px;border:2px solid #ff3b3b;box-shadow:0 0 36px rgba(255,40,40,.6),0 10px 34px rgba(0,0,0,.6)}

/* ===== 横屏适配：仅在“矮视口”(orientation:landscape + max-height:560px)触发，竖屏/桌面/平板竖屏永不命中，零回归 ===== */
@media (orientation:landscape) and (max-height:560px){
  /* (1) 叠层：竖直居中 -> 顶部对齐滚动，修复高内容(标题 ov-inner ~1054px / 菜单 / 合成)顶部被裁切且无法上滚的致命 bug；并补横屏刘海左右安全区 */
  .overlay{align-items:flex-start;

  .mode-list{max-width:560px}
  .mode-card{padding:9px 14px}.mode-name{font-size:18px}.mode-desc{font-size:11px;line-height:1.45}
  /* (3) 合成/炼晶/温馨小屋棋盘按高度收敛，修复 4x4 在 375px 高度溢出顶底 */
  .mgrid{max-width:min(50vh,360px);gap:5px;padding:6px}

  .mgsub{display:none}

  .ov-foot{padding:7px calc(8px + env(safe-area-inset-right)) calc(7px + env(safe-area-inset-bottom)) calc(8px + env(safe-area-inset-left));gap:8px}
  .ov-close{top:10px;right:calc(10px + env(safe-area-inset-right));width:38px;height:38px;font-size:16px}
  /* (5) HUD：强制单行不换行 + 整体压扁，修复横屏下 HUD 换行成 2-3 行吃掉顶部 30% 高度并压住 #bossbar/toast 的问题；隐藏 #depthbox */
  #hud{padding:5px calc(8px + env(safe-area-inset-right)) 5px calc(8px + env(safe-area-inset-left));gap:6px}

  #goBtn{top:84px;right:12px;font-size:12px;padding:6px 11px 5px}
  /* (6) 触屏控件整体缩小并贴合安全区，修复矮屏下左下摇杆与右下闪避/技能键互相重叠并顶进 HUD；保留 body.lefty 左右镜像 */
  #joy{width:96px;height:96px;left:calc(18px + env(safe-area-inset-left));bottom:calc(16px + env(safe-area-inset-bottom))}
  #joyknob{width:42px;height:42px}
  body.lefty.intown #joy,body.lefty #joy{left:auto;right:calc(18px + env(safe-area-inset-right))}
  #dashbtn{width:64px;height:64px;font-size:22px;right:calc(16px + env(safe-area-inset-right));bottom:calc(14px + env(safe-area-inset-bottom))}
  body.lefty #dashbtn{left:calc(16px + env(safe-area-inset-left));right:auto}
  #skbtn0{width:48px;height:48px;right:calc(86px + env(safe-area-inset-right));bottom:84px}
  #skbtn1{width:48px;height:48px;right:calc(18px + env(safe-area-inset-right));bottom:106px}
  #flaskbtn{width:44px;height:44px;right:calc(92px + env(safe-area-inset-right));bottom:20px}
  body.lefty #skbtn0{left:calc(86px + env(safe-area-inset-left));right:auto}
  body.lefty #skbtn1{left:calc(18px + env(safe-area-inset-left));right:auto}
  body.lefty #flaskbtn{left:calc(92px + env(safe-area-inset-left));right:auto}
  /* (7) 城内交互提示 + boss 血条上移避开矮屏底部控件；toast 不动(右上 pointer-events:none 不挡点击) */
  #hint{bottom:calc(96px + env(safe-area-inset-bottom));font-size:12px;padding:6px 14px;max-width:62vw}
  #bossbar{top:48px;width:min(70vw,520px)}
  #bossname{font-size:11px;letter-spacing:.16em}
  /* (8) 布阵塔防底栏横屏轻量收紧（避免吃掉过多竖向空间） */
  #tdbar{padding:4px calc(8px + env(safe-area-inset-right)) calc(4px + env(safe-area-inset-bottom)) calc(8px + env(safe-area-inset-left));gap:3px}

  #tdbar .tdrow .pbtn{margin:0;padding:6px 8px 5px;font-size:11px}

.cdex-foilwrap{position:relative;display:inline-block;max-width:330px;width:100%;line-height:0}

.cdex-foilfx.on{opacity:1}
.cdex-foilfx::before{content:"";position:absolute;inset:-25%;background:repeating-linear-gradient(112deg,rgba(255,46,150,.20) 0%,rgba(255,186,46,.20) 11%,rgba(46,232,172,.20) 22%,rgba(46,150,255,.20) 33%,rgba(196,74,255,.20) 44%,rgba(255,46,150,.20) 55%);background-size:210% 210%;mix-blend-mode:overlay;animation:cdexHue 4.8s linear infinite}
.cdex-foilfx::after{content:"";position:absolute;inset:0;background:linear-gradient(118deg,transparent 42%,rgba(255,255,255,.55) 49%,rgba(255,255,255,.10) 53%,transparent 58%);background-size:240% 240%;mix-blend-mode:screen;animation:cdexSweep 3.3s ease-in-out infinite}
@keyframes cdexHue{0%{background-position:0% 50%}100%{background-position:240% 50%}}
@keyframes cdexSweep{0%{background-position:138% 0}100%{background-position:-38% 0}}
#ovDex .cdex-cell .cdex-soon{position:absolute;left:0;right:0;bottom:0;text-align:center;font-size:10px;padding:3px 0;background:rgba(10,12,20,.86);color:var(--gold);letter-spacing:.14em;border-top:1px solid rgba(255,205,117,.28)}

function rollItem(boost){
  // boost：稀有度加权（0 普通 / 1 精英 / 2 Boss），叠加周目
  const b=(boost||0)+(RUN?RUN.ng*.5:ngScale(META.diffMax)*.3)+((RUN&&RUN.endless)?RUN.room*0.12:0);
  let w=[Math.max(2,46-b*9),28,16+b*1.5,9+b*2,4+b*2,1.4+b*1.3,0.4+b*0.8];
  const tot=w.reduce((a,x)=>a+x,0);let roll=rnd(tot),rar=0;
  for(let i=0;i<7;i++){if(roll<w[i]){rar=i;break;}roll-=w[i];}
  const slot=pick(Object.keys(EQ_SLOTS));
  // 物品等级：无尽模式 = 层数（无上限！），普通 = 章节+周目
  const ilvl=RUN?(RUN.endless?RUN.room:RUN.tier*2+RUN.ng*3+1):Math.max(1,ngScale(META.diffMax)*2);
  const iMul=1+Math.pow(ilvl,BAL.ilvlExp)*BAL.ilvlMul; // 次线性：评分无上限，实战属性不爆炸
  const af={};
  const keys=shuffle(Object.keys(AFFIX)).slice(0,RARS[rar].n);
  keys.forEach(k=>{const a=AFFIX[k];

function applyItem(p,it,dir){ // dir=+1 穿上 / -1 卸下（增量可逆，换装不丢本局强化）
  const af=it.af,mul=(v)=>dir>0?(1+v/100):1/(1+v/100);

  jin:{en:"Sijin",avatar:"赤狐",sign:"水瓶座 · 风象",team:"队③",lore:"赤狐少女，橙红长发与白色发梢，狐耳白尖，金瞳，深褐斗篷，向阳手链，争胜锐气。从不从弱者身上偷分，目标永远是第一名。「从最强的人那里拿，才算数。」向阳手链是她自己编的，窗台上的向日葵没人认领，但从没枯死。原型代号 李思瑾。",relations:"队③〔晰·屿〕；稳重·进步巨大",status:"在场·稳健大成长"},

  yin:{en:"Yilin",avatar:"灰狼·双声（北美灰狼·琳的另一面）",sign:"狮子座 · 火象",team:"边缘游荡",lore:"灰狼少女，斗篷左右两色（左深蓝右暗紫，象征双声分裂），紫瞳，唱歌姿态。琳的另一个独立形态。五月末「第一次没有回到琳体内」。原型代号 姚逸琳（另一面，实际原形是参加狼先生另一个英语班）。",relations:"琳（本体）",status:"在场·独立体确立·边缘游荡（5月末首次未回到琳体内，已成独立形态）"},

  xuan:{en:"Xuan",avatar:"狞猫",sign:"摩羯座 · 土象",team:"黑域·蛇女王阵营",lore:"狞猫少女，沙金毛超长黑耳簇，紫竖瞳，紫斗篷持紫绢扇，慵懒危险的笑。不属于任何一对 CP——她是别人 CP 的引擎。原型代号 衣璇。",relations:"叶王（从属）；慧（发小）",status:"在场"},
  parrot:{en:"Parrot Professor",avatar:"鹦鹉",sign:"",team:"NPC·中立",lore:"灰绿鹦鹉学究，红喙圆眼镜，灰色学袍，胸前挂复读机，迂腐刻板。相信知识可以被「灌」进去，相信沉默等于服从，相信正确答案只有一个。机械复读机永远开着——那个声音安全、可预测、不带惊喜。原型代号 虚拟 NPC（编出来的）。",relations:"马将军（曾蛊惑·已被其背离）",status:"在场"},
  one:{en:"Jingyi",avatar:"天鹅",sign:"摩羯座 · 土象",team:"边缘·隐藏",lore:"天鹅少女，纯白+金滚边，几乎透明的白光感，神秘定稿人。没人见过她两次。出现时如同白光穿过教室，消失时连影子都不留。世界编年史的定稿者。本相为天鹅（唯一）。原型代号 徐景一。",relations:"世界编年史的定稿者（与众人无固定羁绊）",status:"传说·中期消失"},
  blackcat:{en:"Blackcat",avatar:"黑猫",sign:"",team:"特殊",lore:"纯黑小猫（非拟人，四足），绿眼白胸，尾巴问号状，电子宠物，要可爱。始终跟着猫女琳上蹿下跳的那一只无名小黑猫。",relations:"琳（如影随形的无名小黑猫）",status:"在场"},
  yang:{en:"Xinyang",avatar:"大熊猫",sign:"射手座 · 火象",team:"队④",lore:"大熊猫少年，黑白毛、黑眼圈、黑耳黑臂，体格敦实；光明学徒斗篷金边，身旁有生锈的魔法召唤小铁笼或骰子，独行随性而沉稳。「骰子比星座更诚实。」觉醒那天骰出了学期最高点，他只耸了耸肩。生锈魔法召唤笼放在教室角落，装着你不想面对的那部分自己。原型代号 赵鑫洋。",relations:"队④〔炜·荣〕阵营摇摆队（已定：归光明）",status:"在场·光明·队④（阵营摇摆已定：归光明）"},
  jia:{en:"Yujia",avatar:"丹顶鹤",sign:"水瓶座 · 风象",team:"光明学徒",lore:"丹顶鹤少女，颀长白羽、头顶丹顶红冠、细长颈、黑白翼羽、浅金瞳；手持古卷或探询之笔，脚边薄雾呼应边境失踪伏笔。问题总是最准的那一个——直击核心。下课后默坐两分钟，把刚学过的事在脑中过一遍。三月初，佳随老师外出采集古卷——边境沼泽上一入不返。原型代号 宋昱佳。",relations:"光明学徒（队属未定·与诺等同窗）",status:"失踪·生死成谜（开放伏笔，不写死，保留回归可能）"},
  xin:{en:"Yongxin",avatar:"刺猬",sign:"射手座 · 火象",team:"原队②",lore:"刺猬少女，棕褐针刺化为背后披风和发缘尖刺纹理，戴一副不发声的空耳机；神情内敛坚韧，有素净绷带细节但不血腥。戴着空耳机进教室——不是在听音乐，只是需要一道物理意义上的边界。原型代号 刘永欣。",relations:"原队②（战役重伤·已隐退休养，由麒接替队位）；与海、浩是互帮互助的三人小队",status:"隐退休养（战役重伤·大量失血）"},

const LORE_SECTIONS=[{"key": "prologue", "title": "楔子 · 风暴前夜", "subtitle": "序章 · Prologue · 摘自狼先生未公开私人笔记 编号0531", "prose": "那一夜，狼先生没有睡。一只信鸽落在窗台，脚环系着一片紫色蛇鳞——那是叶王的请柬，也是宣战；鸽子飞走时，远处天空裂开一道极细的缝，像有人在另一边偷偷看了一眼。他从鹿皮袋里取出刻着 MYSKME 的铜印，呵一口气，按在纸上。「该到了。」他对空房间说。窗外，五月最后一片银杏叶，悄悄变成了金色。", "items": [{"name": "狼先生学院", "desc": "不强制、不评分，只在你最想放弃那天把你拉起来"}, {"name": "叶王的请柬", "desc": "一片紫蛇鳞，既是邀约也是宣战"}, {"name": "MYSKME 铜印", "desc": "磨得锃亮、几乎照出人影的开学信物"}]}, {"key": "realms", "title": "三国鼎立 · 每一国都觉得自己是对的", "subtitle": "Three Realms in Conflict · 学院 / 黑域 / 灰塔", "prose": "学院、黑域、灰塔，三方都自称在救人，三方都各有伤口。学院只做一件事——在你最想放弃那天让你想再打一场；黑域叶王织一张比所有网都精致的网，让人心甘情愿走进去；灰塔鹦鹉学院信奉「正确答案只有一个」，把知识灌进去、把沉默当服从。中立者游走于三国之间，是终战前各方都想拉拢的变量。", "items": [{"name": "学院之地 · 光明学徒", "desc": "现编：睿琳涵海浩麒瑾晰屿诺佳欣；招新：月铎文晓炜荣洋璐。谁掉队都不肯丢下的那一边"}, {"name": "黑域 · 叶王集团（蛇女王）", "desc": "叶王首脑·璇引诱者·慧追随·菀半叛入·航献祭者·音边缘游荡。最锋利的武器是让人自愿入笼"}, {"name": "灰塔 · 鹦鹉学院", "desc": "鹦鹉教授领军，七月携「童声复读机」卷土重来，与叶王二度密盟；马将军已脱离"}, {"name": "中立 · 摇摆与游荡者", "desc": "炜、荣、洋编为摇摆队、阵营未定；璐独立受教带来哼唱；音在西墙之外游离"}]}, {"key": "timeline", "title": "编年 · 全卷八章", "subtitle": "The Serial · 连载至第五章（编纂：诺·佳·涵 / 定稿：一）", "prose": "全卷八章，第一章从一只茶壶开始，终章在仲夏夜的火里收场。前四章已完结，第五章正在连载，后三章只放出预告——跟所有还没写完的故事一样，最要命的总在「下一章」。关键节点：05·31 本卷启 / 06·15 新人到 / 07·14 鹦鹉归 / 07·30 航之祭 / 08·15 仲夏夜。", "items": [{"name": "第一章 · 立学之初（约十年前）", "desc": "一柱一壶、五人自来。狼先生把茶端给最先到的琳，她一待就是十年"}, {"name": "第二章 · 越界之罪（三年前）", "desc": "翻车鱼少年屿化鸟越界，与游学的诺在断云上对视一眼，引海天七月浅战；狼先生独行云阶换停火，留下未愈剑伤"}, {"name": "第三章 · 黑化之始（一年前）", "desc": "叶王初现石墙、菀消失一个清晨；璇被收下又带走发小慧，黑域始具雏形"}, {"name": "第四章 · 紫光面具（八个月前）", "desc": "中立的蛇男航看了面具七昼夜，第八天清醒地自己戴上，眼里从此只剩叶王"}, {"name": "第五章 · 此刻 · 五月末（连载中）", "desc": "诺与琳越走越近；音首次脱体翻出西墙；璇潜回推航走完最后一步；狼先生重写七年未满的招新名单"}, {"name": "第六章 · 六月 · 新人到（预告）", "desc": "月铎文晓炜荣洋璐自己找上门；月铎已向蛇女王下战书，炜荣洋阵营未定"}, {"name": "第七章 · 七月 · 雷动（预告）", "desc": "鹦鹉携童声复读机归来、与叶王二度密盟；月底航完成第一次献祭，笑着倒下"}, {"name": "终章 · 八月十五 · 仲夏夜（待更新）", "desc": "无名之原，三界共燃。四股黑潮汇于一夜——那一夜没有月亮也没有星，所有的光都来自地上的人"}]}, {"key": "bonds", "title": "羁绊与绑死 · 护你的，也拽你下沉的", "subtitle": "Bonds & Bindings · 七条羁绊，三向上四向下", "prose": "七条羁绊，三条让人更强，四条让人下坠。能毁掉一个人的，往往正是他最舍不得放手的那一根。最稳的关系长在沉默里，最致命的关系藏在自愿里。", "items": [{"name": "慢生 · 诺×琳", "desc": "菀消失后，琳每天放一杯热茶在诺桌角、从不停留。第七天一句谢谢，第六十天成了彼此最稳的那根——不轰烈，只是真实地长出来"}, {"name": "至死的痴恋 · 航→叶王", "desc": "暗王蛇血脉的航把全部奉出。叶王从未索求，这才最致命；他将在仲夏夜化作她手里最长的一根钉"}, {"name": "灵魂的另一面 · 琳/音", "desc": "没人知道她俩是一人还是两人。五月末音第一次没回到琳体内，翻出西墙游荡——曾是同一个人，如今互为最怕的那一面"}, {"name": "引诱者 · 璇↣慧 / 航", "desc": "璇不属于任何 CP，她是别人 CP 的引擎。先带走发小慧，再让航自己走完那条路：「我只是让水比他们以为的要近」"}, {"name": "静伴 · 月×慧", "desc": "同为天秤、同为风象，一个留在学院灯下，一个随璇走进紫阴。月在窗台多放一只杯子，茶每天只凉一半，谁都不提"}, {"name": "未完之约 · 菀…？", "desc": "她一页页变透明，最后走进雨里——没死，也没真属于叶王。诺把没写完的笔记本递给她，她接过、转身"}, {"name": "淬炼成伴 · 晰×屿", "desc": "从针锋相对到最佳搭档。都是挨过打却没倒下的人，认出了彼此；晰拿了满分，第一个鼓掌的是曾处处作对的屿"}]}, {"key": "mysteries", "title": "悬案 · 尚未写完的几页", "subtitle": "Open Files · 连「一」也没敢定稿的六页", "prose": "这卷编年史里留着六页空白。不是忘了写，是写不下去——每一页背后都站着一个还没回家的人，或一个还没揭开的盖子。线索都在，答案都不在。", "items": [{"name": "FILE 01 · 佳，去哪了", "desc": "三月随狼先生采集古卷，于边境沼泽一入不返。默书只留「下落不明」。分头时她回头喊：「水不凉。别跟过来。」"}, {"name": "FILE 02 ·「一」究竟是谁", "desc": "天鹅女「一」，没人见过两次，笔不蘸墨蘸的是空气里的某种东西。本卷中途她将彻底消失——这一页是她亲手写的"}, {"name": "FILE 03 · 菀，既没死也没活", "desc": "一页页变透明、走进雨里。日记第88页空白没敢写，诺每晚把本子压在枕下；偶尔有人在没有作者的诗里读到她的句子"}, {"name": "FILE 04 · 紫光面具从何而来", "desc": "叶王放在石头上，航看七昼夜后自戴。没人知道最初是谁做的；摘下它只需一个比叶王更愿听航说话的人——学院还没有"}, {"name": "FILE 05 · 那条没有刻度的经线", "desc": "狼先生书房的老航海图上有一条没标度数的经线，恰好穿过每个学徒的家乡。他来自风从三方吹来的南半球岛国，抽屉压着鹤师未拆的旧信"}, {"name": "FILE 06 · 仲夏夜谁能站着回来", "desc": "八月十五无名之原，十年来三国首次同地。预言只写到这里就停了，「一」的定稿本停在八月十四的夜里"}]}, {"key": "prophecy", "title": "终章 · 仲夏夜必至之歌", "subtitle": "Prophecy · 八月十五 · 无名之原 · 三界共燃", "prose": "春末藏着一根针，没人看见它在哪里，但所有人的脚都开始疼。八月十五，紫色的火从一个男孩身上起来——他笑着倒下，因为终于派上了用场；雨里有人转身，但她已不再有形，诺把笔记本递出去，笔记本变成了她。狼先生最后一句：「我们不是为了赢这场，我们只是不让那些不该消失的人，消失得那么彻底。」", "items": [{"name": "四股黑潮", "desc": "叶王的紫蛇大军、鹦鹉的复读军团、暗化的音、献祭后的航，汇于一夜"}, {"name": "光明一侧", "desc": "狼先生、五位新人、所有现存学生，加白鹤宰相借出的天之国援军与屿带回的海域同盟"}, {"name": "叶王真面目", "desc": "一条网纹蟒，从不公开宣布主张。她让人清醒地献出自己、再自愿带上锁——这才是黑域最锋利的武器"}, {"name": "那一夜没有月也没有星", "desc": "所有的光，都来自地上的人。MYSKME · Volvme II · 完 · Make Yourself Special & const _artLoad=(k,onDone)=>{const im=new Image();
  im.onload=()=>{ARTIMG[k]=im;
    if(k.slice(0,3)==='bg_'){if(('bg_'+_groundKey)===k&&(MODE==='town'||MODE==='run')){if(_groundKey==='town')buildGround('town');else buildGround('run',parseInt(_groundKey.slice(1),10));}}
    if(onDone)onDone();};
  im.onerror=function(){if(onDone)onDone();}; // 缺图静默回退,仍计数以免卡批
  im.src=ART[k];};
const _critical=new Set([...(typeof DEFAULT_UNLOCKED!=='undefined'?DEFAULT_UNLOCKED:[]),'m_snake','m_vine','bg_town'].filter(k=>ART[k]));

(function _drainRest(i){
  if(i>=_rest.length)return;
  const BATCH=12,end=Math.min(i+BATCH,_rest.length);let pend=end-i;
  const batchDone=function(){ if(--pend<=0){ refreshArtViews(); _ric(function(){_drainRest(end);}); } };
  for(let j=i;j<end;j++)_artLoad(_rest[j],batchDone);
})(0);

let _badgeCv=null,_badgeWm=null;
function arcText(g,txt,cx,cy,r,a0,a1,size,flipChar){
  g.font='900 '+size+'px "Arial Black","Helvetica Neue",sans-serif';
  g.textAlign='center';g.textBaseline='middle';
  const n=txt.length;
  for(let i=0;i<n;i++){
    const t=n===1?.5:i/(n-1),a=a0+(a1-a0)*t;
    g.save();g.translate(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    g.rotate(a+Math.PI/2+(flipChar?Math.PI:0));
    g.fillText(txt[i],0,0);g.restore();}
}
function buildBadge(color,size){
  const c=mkCv(size,size),g=c.getContext('2d');
  const cx=size/2,cy=size/2,R=size/2;
  g.strokeStyle=color;g.fillStyle=color;
  g.lineWidth=R*.075;g.beginPath();g.arc(cx,cy,R*.95,0,7);g.stroke();   // 外环
  g.lineWidth=R*.028;g.beginPath();g.arc(cx,cy,R*.855,0,7);g.stroke();  // 内细环
  const d2r=Math.PI/180;
  arcText(g,'MAKE YOURSELF',cx,cy,R*.70,(-90-62)*d2r,(-90+62)*d2r,R*.155,false);
  arcText(g,'SPECIAL & KIND',cx,cy,R*.70,(90+62)*d2r,(90-62)*d2r,R*.155,true);
  g.lineWidth=R*.05;
  g.beginPath();g.arc(cx,cy,R*.50,(-90-58)*d2r,(-90+58)*d2r);g.stroke(); // 上弧
  g.beginPath();g.arc(cx,cy,R*.50,(90-58)*d2r,(90+58)*d2r);g.stroke();   // 下弧
  g.font='900 '+(R*.34)+'px "Arial Narrow","Arial Black",sans-serif';
  g.textAlign='center';g.textBaseline='middle';
  g.save();g.translate(cx,cy);g.scale(1.18,1.45);g.fillText('MYSKME',0,1);g.restore();
  return c;
}

/* 碰撞 */
function hitObstacle(x,y,r){
  if(x<r||y<r||x>mapW-r||y>mapH-r)return true;
  for(const o of obstacles){
    if(o.tree){ // 树：碰撞收紧到树干脚下小箱(对齐 drawTreePx(o.x+13,o.y+22) 的树干基)，树冠可穿行
      if(x+r>o.x+5&&x-r<o.x+21&&y+r>o.y+13&&y-r<o.y+26)return true; continue;}
    if(o.rock){ // 巨石/雕像/碑：左右+顶部内缩6px去掉视觉外缘空气墙(贴图每侧比箱宽13px，内缩仍在实体内)，底边贴地保留
      if(x+r>o.x+6&&x-r<o.x+o.w-6&&y+r>o.y+6&&y-r<o.y+o.h)return true; continue;}
    if(x+r>o.x&&x-r<o.x+o.w&&y+r>o.y&&y-r<o.y+o.h)return true;}
  for(const d of sceneDeco){ // 实心装饰道具(树等)树干小碰撞箱
    if(d.solid&&x+r>d.x-9&&x-r<d.x+9&&y+r>d.y-9&&y-r<d.y+4)return true;}
  return false;
}
function moveEntity(e,dx,dy){
  let moved=false;
  if(dx&&!hitObstacle(e.x+dx,e.y,e.r)){e.x+=dx;moved=true;}
  if(dy&&!hitObstacle(e.x,e.y+dy,e.r)){e.y+=dy;moved=true;}
  // 墙角滑动：两轴都被挡时，沿障碍边缘找一条缝滑过去（防卡墙角）
  if(!moved&&(dx||dy)){
    const m=Math.hypot(dx,dy)||1;
    const cands=dx?[[dx*.6,-Math.abs(dx)*.8],[dx*.6,Math.abs(dx)*.8]]
                  :[[-Math.abs(dy)*.8,dy*.6],[Math.abs(dy)*.8,dy*.6]];
    if(dx&&dy)cands.push([dx,0],[0,dy]);
    for(const c of cands){
      if(!hitObstacle(e.x+c[0],e.y+c[1],e.r)){e.x+=c[0];e.y+=c[1];break;}}
  }
}
/* 嵌墙自救：万一实体卡进障碍（生成/位移异常），螺旋搜索最近空位推出 */
function unstick(e){
  if(!hitObstacle(e.x,e.y,e.r*.6))return;
  for(let rad=6;rad<=160;rad+=8){
    for(let a=0;a<8;a++){
      const nx=e.x+Math.cos(a/8*Math.PI*2)*rad,ny=e.y+Math.sin(a/8*Math.PI*2)*rad;
      if(!hitObstacle(nx,ny,e.r)){e.x=nx;e.y=ny;return;}}}
}

  const teaBonus=META.bld.tea*11+(T.hp||0)*12+(catLv()>=3?5:0)+_lvb.hp;
  let maxhp=c.hp+teaBonus; if(cid==='lin')maxhp=Math.round(maxhp*1.1);

  const flaskMax=META.decor.statue?3:2;
  const p={cid,x:mapW/2,y:mapH/2,r:14,emoji:c.emoji,name:c.name,
    hp:maxhp,maxhp,spd:c.spd*(1+(T.spd||0)*0.04),baseAtk:c.atk,atkMul:dojoBonus,rateMul:1,rangeMul:cid==='nuo'?1.25:1,
    crit:(cid==='jin'?.25:.05)+(T.crit||0)*0.04,leech:cid==='xi'?.12:0,thorn:0,
    goldMul:(1+META.bld.dove*0.12)*(1+(T.gold||0)*0.10)*(1+catGold),
    dashCdMul:(cid==='qi'?.5:1)*(1-(T.dash||0)*0.08)*(MELEE_WPNS.includes(c.wpn)?.85:1),multi:0,wpn:c.wpn,
    tArmor:(T.armor||0),wolfRevive:T.wolf?1:0,bArmor:0,
    bDash:0,bFrenzy:0,bPulse:0,bRegen:0,bWolf:0,bCritDmg:0,bElite:0,bEcho:0,
    dashBoostT:0,frenzyT:0,boons:[],
    skills:[],flask:flaskMax,flaskMax,shieldHp:0,
    atkCd:0,dashCd:0,dashing:0,dvx:0,dvy:0,face:1,inv:0,

function makeNpc(id,x,y){
  return {id,x,y,r:13,emoji:CHARS[id]?CHARS[id].emoji:'•',name:CHARS[id]?CHARS[id].name:id,
    tx:x,ty:y,wait:rndi(120),bubble:null,bubbleT:0,quoteIdx:0};
}
function decorAnchor(id){const dc=DECORS[id];if(!dc)return{x:-99999,y:-99999};
  return {x:mapW/2+dc.dx,y:mapH/2+dc.dy+(dc.h?dc.h/2+26:0)};}
function updateNpc(n){
  if(n.swan){n.x+=2.2;n.y-=.4;if(n.x>mapW-40)n.dead=true;return;}
  // 小黑猫：信任后跟随玩家
  if(n.cat&&catLv()>=1&&P){
    const d=dist(n,P);
    if(d>56){const vx=(P.x-n.x)/d,vy=(P.y-n.y)/d;moveEntity(n,vx*1.6,vy*1.6);n.moving=true;if(vx)n.face=vx>0?1:-1;}
    else n.moving=false;
    if(n.bubbleT>0){n.bubbleT--;if(n.bubbleT<=0)n.bubble=null;}
    return;
  }
  if(n.wait>0){n.wait--;n.moving=false;
    // 在装饰附近驻足时冒生活气泡
    if(n.wait%90===44&&!n.bubble){
      for(const id in META.decor){const a=decorAnchor(id);
        if(Math.hypot(n.x-a.x,n.y-a.y)<90){
          n.bubble=pick(id==='stage'?['♪','♫','跳一段？']:id==='stall'?['好香…','来一碗！']:id==='fountain'?['（许了个愿）','水真亮']:id==='pavil'?['茶真香','这亭子真好']:id==='garden'?['蝴蝶好慢呀','慢一点也好']:['真不错']);
          n.bubbleT=110;break;}}}
  }
  else{
    const d=Math.hypot(n.tx-n.x,n.ty-n.y);
    if(d<6){n.wait=80+rndi(240);n.moving=false;
      const built=Object.keys(META.decor);
      // 选新目标：去逛新建筑 / 找人聊天 / 随便走走
      if(built.length&&Math.random()<.3){const a=decorAnchor(pick(built));n.tx=a.x+rnd(50)-25;n.ty=a.y+rnd(30)-15;}
      else if(Math.random()<.35&&npcs.length>2){const other=pick(npcs);if(other!==n){n.tx=other.x+rnd(60)-30;n.ty=other.y+rnd(60)-30;}}
      else{n.tx=clamp(n.x+rnd(360)-180,60,mapW-60);n.ty=clamp(n.y+rnd(280)-140,120,mapH-60);}
    }else{
      const vx=(n.tx-n.x)/d,vy=(n.ty-n.y)/d;
      moveEntity(n,vx*0.9,vy*0.9);n.moving=true;
      if(vx)n.face=vx>0?1:-1;
      if(Math.hypot(n.tx-n.x,n.ty-n.y)>=d-0.01){n.wait=60;n.tx=n.x;n.ty=n.y;} // 卡住就歇
    }
  }

  if(P&&dist(n,P)<70){
    if(!n.bubble){const qs=TOWN_QUOTES[n.id]||['……'];n.bubble=qs[n.quoteIdx%qs.length];n.quoteIdx++;n.bubbleT=160;}
  }
  if(n.bubbleT>0){n.bubbleT--;if(n.bubbleT<=0)n.bubble=null;}
}

      g.fillRect(rndi(mapW),rndi(mapH),2,2);}
  }else{

const SCENE_PROPS={
  // obstacle=替换岩石障碍的贴图键; deco=散布的装饰道具键(可重复加权)。其余场景待交付后补行即可。
  t0:{obstacle:'prop_t0_rock',deco:['prop_t0_tree','prop_t0_tree','prop_t0_shroom']},
  t1:{obstacle:'prop_t1_brick',deco:['prop_t1_books','prop_t1_pillar','prop_t1_books']},
  t2:{obstacle:'prop_t2_statue',deco:['prop_t2_cage','prop_t2_sword']},
  t3:{obstacle:'prop_t3_rock',deco:['prop_t3_crystal','prop_t3_pillar','prop_t3_crystal']},
  t4:{obstacle:'prop_t4_stele',deco:['prop_t4_lamp','prop_t4_arch']},
  town:{deco:['prop_town_bush','prop_town_bush','prop_town_lamp']}, // 谷地树走 drawTreePx；无 sky
};
const PROP_H={tree:64,rock:46,shroom:30,bush:34,lamp:48,books:34,pillar:64,brick:30,cage:60,sword:54,statue:62,crystal:40,stele:54,arch:74};
const SOLID_DECO={tree:1,rock:1,pillar:1,statue:1,stele:1,arch:1,cage:1}; // 大件实心道具→树干小碰撞箱(菌菇/草等不挡路)
function _propH(k){return PROP_H[k.split('_').pop()]||46;}
function placeSceneDeco(){
  sceneDeco=[];const cfg=SCENE_PROPS[_groundKey];if(!cfg||!cfg.deco||!cfg.deco.length)return;
  const cx=mapW/2,n=4+rndi(4);let tries=0;
  while(sceneDeco.length<n&&tries++<n*10){
    const x=70+rnd(mapW-140),y=120+rnd(mapH-240);
    if(y>mapH-200&&Math.abs(x-cx)<140)continue;   // 避开出生通道(底部中央)
    if(y<150&&Math.abs(x-cx)<150)continue;         // 避开门(顶部中央)
    if(sceneDeco.some(d=>Math.hypot(d.x-x,d.y-y)<88))continue;
    if(hitObstacle(x,y,16))continue; // 避开建筑/岩石(尤其谷地不压建筑/路)
    const key=cfg.deco[rndi(cfg.deco.length)];
    sceneDeco.push({x,y,key,h:_propH(key),solid:!!SOLID_DECO[key.split('_').pop()]});
  }
  sceneDeco.sort((a,b)=>a.y-b.y);
}
function drawSceneDeco(front){ // front=true 画"在玩家身前"(y>玩家)那批；false 画身后那批 → 可躲树后
  if(!sceneDeco.length)return;
  var py=(typeof P!=='undefined'&&P)?P.y:1e9;
  for(var i=0;i<sceneDeco.length;i++){var d=sceneDeco[i];
    if((d.y>py)!==!!front)continue;
    var im=ARTIMG[d.key];if(!im||!im.complete||!im.naturalWidth)continue;
    var dx=d.x-cam.x,dy=d.y-cam.y;
    if(dx<-140||dy<-170||dx>W+140||dy>H+140)continue;
    var h=d.h,w=h*im.naturalWidth/im.naturalHeight;
    ctx.save();ctx.globalAlpha=.3;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(dx,dy,w*.32,h*.07,0,0,7);ctx.fill();ctx.restore();
    ctx.drawImage(im,dx-w/2,dy-h,w,h);}
}

function rollGardenReward(rare){

const STAGE_ART={0:'stage-0-snakeforest',1:'stage-1-greytower',2:'stage-2-cagedblade',4:'stage-4-namelessvale'};
function stageBg(i){return STAGE_ART[i]?`background-image:linear-gradient(rgba(9,9,13,.58),rgba(9,9,13,.80)),url('${CHAP_DIR}${STAGE_ART[i]}-640.webp');background-size:cover;background-position:center;`:'';}
// 编年史章节海报（lore section key → 海报 basename）。缺图=onerror 隐藏，不影响文字。
const CHAP_POSTER={prologue:'chapter-prologue',mysteries:'chapter-mask',bonds:'chapter-sacrifice',prophecy:'chapter-midsummer'};
// 主线头目专属遗物 → Codex 遗物图标（按 UNIQUES 键匹配）。缺图=回退通用槽位图标。
const RELIC_ART={xuan_fang:'relic-tooth',parrot_echo:'relic-echo',ye_mask:'relic-mask',rift100:'relic-genesis'};
function bossCardReveal(fid,name,line){
  if(BOSS_CARD_IDS.indexOf(fid)<0)return;
  var e=document.getElementById('bossCard');if(!e)return;
  var ba=bossArtURL(fid),card='assets/cards/'+fid+'-full.jpg',src=ba||card;
  // 新立绘失败 → 退角色卡 jpg → 再失败隐藏
  e.innerHTML=IZ('<img src="'+src+'" alt="" onerror="if(this.src.indexOf(\'boss-\')>=0){this.src=\''+card+'\'}else{this.style.display=\'none\'}"><div class="bc-name">'+(name||'')+'</div>'+(line?'<div class="bc-line">'+line+'</div>':''));
  e.classList.add('on');
  if(_bossCardT)clearTimeout(_bossCardT);
  _bossCardT=setTimeout(function(){var x=document.getElementById('bossCard');if(x)x.classList.remove('on');},2600);
}
function bossBanner(f,line,color){
  bossCardReveal(f.fid,f.name,line);
  $('#bossbar').classList.add('on');
  $('#bossname').textContent=f.name;
  var bf=$('#bossface'),ba=bossArtURL(f.fid);
  if(ba){bf.onerror=function(){bf.style.display='none'};bf.onload=function(){bf.style.display='block'};bf.src=ba;}
  else{bf.style.display='none';bf.removeAttribute('src');}
  flash(f.boss?'red':'purple');shake();
  toast((f.boss?'⚡ BOSS 出现！！':'⚡ 强敌来袭！')+' '+line);
  startBgm(f.fid==='ye'?'final':'boss');
}
/* ============ 敌人 AI ============ */
function updateFoe(f){
  f.t++;if(f.hurtFlash>0)f.hurtFlash--;
  if(f.slowT>0)f.slowT--;
  if(f.rootT>0)f.rootT--;
  const sf=f.rootT>0?0:(f.slowT>0?0.3:1); // 凝滞/缠绕系数
  const d=dist(f,P),dx=(P.x-f.x)/(d||1),dy=(P.y-f.y)/(d||1);
  const chase=(sp)=>moveEntity(f,dx*sp*sf,dy*sp*sf);
  switch(f.ai){
    case 'chase':chase(f.spd);break;
    case 'swoop':{ // 绕圈+俯冲
      if(f.charge>0){moveEntity(f,f.vx,f.vy);f.charge--;}
      else if(d<260&&f.t%140<10){f.vx=dx*6;f.vy=dy*6;f.charge=22;}
      else{const a=f.t*.03;moveEntity(f,Math.cos(a)*1.6+dx*.8,Math.sin(a)*1.6+dy*.8);}
      break;}
    case 'turret':{
      f.fireT--;if(f.fireT<=0&&d<420){f.fireT=f.fireCd;fireAt(f,P,3.2,'#38b764');}break;}
    case 'shooter':{
      if(d>220)chase(f.spd);else if(d<140)chase(-f.spd*.7);
      f.fireT--;if(f.fireT<=0&&d<460){f.fireT=f.fireCd;
        fireAt(f,P,f.slow?2.2:3.4,f.slow?'#b07ce8':'#ef7d57',f.slow);}break;}
    case 'charger':{ // 慧：蓄力冲撞
      if(f.phase===0){chase(f.spd);if(f.t%160===130){f.phase=1;f.t=0;}}
      else if(f.phase===1){ // 蓄力红光
        if(f.t>30){f.phase=2;f.vx=dx*8.5;f.vy=dy*8.5;f.t=0;}}
      else{moveEntity(f,f.vx,f.vy);if(f.t>26||hitObstacle(f.x+f.vx,f.y+f.vy,f.r)){f.phase=0;f.t=0;}}
      break;}
    case 'twovoice':{ // 音：近战相位/远程相位 交替
      const ph=Math.floor(f.t/240)%2;
      if(ph===0){chase(f.spd);}
      else{if(d<200)chase(-f.spd*.6);
        if(f.t%40===0){for(let i=0;i<6;i++){const a=Math.PI*2/6*i+f.t*.01;
          eshots.push(mkShot(f.x,f.y,Math.cos(a)*2.6,Math.sin(a)*2.6,'#94b0c2',f.atk*.8));}}}
      break;}
    case 'hang':{ // 航：高速突斩 + 狂化计时
      if(f.enrageT>0){f.enrageT--;
        if(f.enrageT===0&&!f.enraged){f.enraged=true;f.atk=Math.round(f.atk*1.6);f.spd*=1.3;
          flash('purple');shake();toast('紫光暴涨——航狂化了！');}}
      if(f.charge>0){moveEntity(f,f.vx,f.vy);f.charge--;
        if(f.charge===0&&d<300)fireRing(f,8,2.8,'#b07ce8',f.atk*.6);}
      else if(f.t%110<8&&d<360){f.vx=dx*7.5;f.vy=dy*7.5;f.charge=18;}
      else chase(f.spd);
      break;}
    case 'xuan':{ // 璇：瞬移 + 扇形紫弹 + 召唤
      f.tele--;
      if(f.tele<=0){f.tele=200;
        spawnParts(f.x,f.y,'#b07ce8',16,4);
        let nx,ny,tr=0;do{nx=120+rnd(mapW-240);ny=100+rnd(mapH-300);tr++;}while(Math.hypot(nx-P.x,ny-P.y)<180&&tr<20);
        f.x=nx;f.y=ny;spawnParts(f.x,f.y,'#b07ce8',16,4);
        fireFan(f,P,5,.5,3,'#b07ce8',f.atk*.7);}
      if(f.t%330===200&&foes.length<5){spawnFoe('snake',f.x+40,f.y);spawnFoe('snake',f.x-40,f.y);toast('璇召来了紫鳞蛇');}
      if(d>260)chase(f.spd*.8);else if(d<150)chase(-f.spd*.5);
      break;}
    case 'parrot':{ // 鹦鹉教授：弹环 + 复读（双倍重放）+ 召唤傀儡
      if(d>300)chase(f.spd);
      if(f.t%180===60){fireRing(f,10,2.6,'#ef7d57',f.atk*.7);f.lastMove='ring';}
      if(f.t%180===150&&f.lastMove==='ring'){fireRing(f,14,3,'#ffcd75',f.atk*.7);fireRing(f,7,2.2,'#ef7d57',f.atk*.6);toast('复读 · 加倍！');}
      if(f.t%420===300&&foes.length<5){spawnFoe('puppet',f.x+50,f.y);spawnFoe('puppet',f.x-50,f.y);}
      break;}
    case 'ye':{ // 叶王：紫域 + 螺旋弹 + 蛇群；半血二阶段
      const ph2=f.hp<f.maxhp/2;
      if(!f.ph2&&ph2){f.ph2=true;flash('purple');shake();toast('叶王褪下了第一层鳞——「我也理解你。」');f.spd*=1.25;}
      if(d>240)chase(f.spd);
      if(f.t%(ph2?90:140)===40){ // 紫域预警圈
        zones.push({x:P.x,y:P.y,r:86,warn:60,life:60,dmg:f.atk*.9,color:'#b07ce8'});}
      if(f.t%14===0){const a=f.t*.11;
        eshots.push(mkShot(f.x,f.y,Math.cos(a)*2.8,Math.sin(a)*2.8,'#b07ce8',f.atk*.55));
        if(ph2)eshots.push(mkShot(f.x,f.y,Math.cos(a+Math.PI)*2.8,Math.sin(a+Math.PI)*2.8,'#ef4d4d',f.atk*.55));}
      if(f.t%500===380&&foes.length<6){spawnFoe('snake',f.x+60,f.y);spawnFoe('snake',f.x-60,f.y);spawnFoe('mask',f.x,f.y+60);toast('紫蛇大军涌来');}
      break;}
  }
  // 触碰伤害
  if(d<f.r+P.r&&P.inv<=0){hurtPlayer(f.atk,f);}
}
function mkShot(x,y,vx,vy,color,dmg,slow){return {x,y,vx,vy,color,dmg,r:5,life:240,slow};}
function fireAt(f,tgt,sp,color,slow){const d=dist(f,tgt)||1;
  eshots.push(mkShot(f.x,f.y,(tgt.x-f.x)/d*sp,(tgt.y-f.y)/d*sp,color,f.atk*.8,slow));}
function fireRing(f,n,sp,color,dmg){for(let i=0;i<n;i++){const a=Math.PI*2/n*i;
  eshots.push(mkShot(f.x,f.y,Math.cos(a)*sp,Math.sin(a)*sp,color,dmg));}}
function fireFan(f,tgt,n,spread,sp,color,dmg){const base=Math.atan2(tgt.y-f.y,tgt.x-f.x);
  for(let i=0;i<n;i++){const a=base-spread/2+spread/(n-1)*i;
    eshots.push(mkShot(f.x,f.y,Math.cos(a)*sp,Math.sin(a)*sp,color,dmg));}}
/* ============ 玩家战斗 ============ */
let slashFx=[]; // 斩击可视化
function nearestFoe(maxD){let best=null,bd=maxD;
  foes.forEach(f=>{const d=dist(f,P);if(d<bd){bd=d;best=f;}});return best;}
function autoAttack(){
  if(P.atkCd>0){P.atkCd--;return;}
  const w=P.wpn;
  const baseCd={sword:32,shot:24,dashk:28,orbit:9999,heavy:50,pulse:34,fast:17,bomb:48,pierce:28,wave:32}[w]; // 远程系提速：原DPS只有近战1/3，SSR远程角色垫底
  const range={sword:94,shot:300,dashk:86,heavy:108,pulse:80,fast:76,bomb:280,pierce:320,wave:260}[w]*(P.rangeMul||1);
  const f=nearestFoe(w==='orbit'?0:range+60);
  if(w==='orbit')return;
  if(!f)return;
  const d=dist(f,P);
  if(d>range)return;
  P.atkCd=Math.round(baseCd/(P.rateMul*(P.frenzyT>0?1.4:1)));
  const dmgRoll=()=>{let dm=playerAtk();let crit=false;
    if(P.bElite&&f&&(FOES[f.fid].elite||FOES[f.fid].boss))dm*=1.25;
    if(Math.random()<P.crit){dm*=P.bCritDmg?2.6:(P.cid==='jin'?2.2:1.8);crit=true;}
    return {dm:Math.round(dm),crit};};
  if(P.bEcho&&Math.random()<.15){const a=Math.atan2(f.y-P.y,f.x-P.x);
    shots.push({x:P.x,y:P.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4,r:12,life:60,color:'#b07ce8',
      pierce:true,wave:true,dmg:{dm:Math.round(playerAtk()*.7),crit:false}});}
  if(w==='sword'||w==='fast'||w==='heavy'||w==='dashk'){
    // 近战弧斩：伤害+15%（原+25%微收，贴脸风险仍保第一梯队），范围内最多 2+multi 个目标，击杀吸血
    const a=Math.atan2(f.y-P.y,f.x-P.x);P.face=Math.cos(a)>=0?1:-1;
    slashFx.push({x:P.x,y:P.y,a,r:range,life:10,heavy:w==='heavy'});
    let hit=0;const beforeN=foes.length;
    foes.forEach(t=>{if(hit>=2+P.multi)return;const dd=dist(t,P);
      if(dd<range+t.r){const da=Math.abs(((Math.atan2(t.y-P.y,t.x-P.x)-a+Math.PI*3)%(Math.PI*2))-Math.PI);
        if(da<1.15){const{dm,crit}=dmgRoll();damageFoe(t,Math.round((w==='heavy'?dm*1.6:dm)*1.15),crit);
          // 击退（并防嵌墙）
          const kb=w==='heavy'?7:4;t.x+=Math.cos(a)*kb;t.y+=Math.sin(a)*kb;
          if(hitObstacle(t.x,t.y,t.r*.6))unstick(t);
          hit++;}}});
    const kills=beforeN-foes.length;
    if(kills>0&&P.hp<P.maxhp){P.hp=Math.min(P.maxhp,P.hp+3*kills);spawnFloat(P.x,P.y-24,'+'+3*kills+'♥','#38b764');}
  }else if(w==='shot'||w==='pierce'){
    const n=1+P.multi;
    for(let i=0;i<n;i++){const d2=dist(f,P)||1;
      const sp=5.5,spread=(i-(n-1)/2)*.12;
      const a=Math.atan2(f.y-P.y,f.x-P.x)+spread;
      shots.push({x:P.x,y:P.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:5,life:80,
        color:P.cid==='yue'?'#ffe5b0':P.cid==='duo'?'#38b764':'#ffcd75',
        pierce:w==='pierce'||P.cid==='duo',dmg:dmgRoll()});}
  }else if(w==='wave'){
    const a=Math.atan2(f.y-P.y,f.x-P.x);
    for(let i=0;i<1+P.multi;i++){
      shots.push({x:P.x,y:P.y,vx:Math.cos(a+i*.18-P.multi*.09)*4,vy:Math.sin(a+i*.18-P.multi*.09)*4,
        r:14,life:70,color:'#b07ce8',pierce:true,wave:true,dmg:dmgRoll()});}
  }else if(w==='bomb'){
    const a=Math.atan2(f.y-P.y,f.x-P.x),fd=Math.min(dist(f,P),range);
    shots.push({x:P.x,y:P.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4,r:7,life:Math.round(fd/4),
      color:'#ef7d57',bomb:true,dmg:dmgRoll()});
  }else if(w==='pulse'){
    slashFx.push({x:P.x,y:P.y,a:0,r:range,life:12,ring:true});
    foes.forEach(t=>{if(dist(t,P)<range+t.r){const{dm,crit}=dmgRoll();damageFoe(t,dm,crit);}});
  }
}
function updateOrbit(){
  if(P.wpn!=='orbit'&&P.cid!=='han')return;
  const n=P.cid==='han'?3:2;
  for(let i=0;i<n;i++){
    const a=frame*.06+Math.PI*2/n*i,ox=P.x+Math.cos(a)*55*(P.rangeMul||1),oy=P.y+Math.sin(a)*55*(P.rangeMul||1);
    if(frame%4===0)foes.forEach(t=>{if(Math.hypot(t.x-ox,t.y-oy)<t.r+12){
      damageFoe(t,Math.round(playerAtk()*.55),false);}});
  }
}
function updateHaiPulse(){
  if(P.cid!=='hai'&&!P.bPulse)return;
  P.pulseT++;
  if(P.pulseT>=300){P.pulseT=0;
    slashFx.push({x:P.x,y:P.y,a:0,r:130,life:14,ring:true});
    foes.forEach(t=>{if(dist(t,P)<130+t.r)damageFoe(t,Math.round(playerAtk()*1.2),false);});
    spawnParts(P.x,P.y,'#38b764',14,4);}
}
function damageFoe(f,dm,crit){
  f.hp-=dm;f.hurtFlash=7;
  spawnFloat(f.x+rnd(20)-10,f.y-f.r-6,(crit?'✦':'')+dm,crit?'#fff':'#ffcd75',crit);
  sfx(crit?'crit':'hit');
  spawnParts(f.x,f.y,crit?'#ffffff':'#ef7d57',crit?14:6,crit?4.5:3);
  if(P.leech>0){P.hp=Math.min(P.maxhp,P.hp+dm*P.leech);}
  if(crit){shake();if(!META.lowFx)hitstop=Math.max(hitstop,3);}
  if(f.hp<=0)killFoe(f);
  _hudDirty=true; // 命中只置脏，update() 末尾每帧最多刷一次 HUD（避免 AoE 单帧重建几十次）
}
function killFoe(f){
  const i=foes.indexOf(f);if(i<0)return;
  foes.splice(i,1);
  spawnParts(f.x,f.y,'#ffcd75',16,5);
  spawnFloat(f.x,f.y-10,'×','#ef4d4d',true);
  sfx('kill');
  if(!(RUN&&RUN.mystery))gainExp(f.boss?25:f.elite?8:2); // 账号经验：杀怪即时成长感
  if(!META.lowFx&&(f.elite||f.boss))hitstop=Math.max(hitstop,5); // 大敌击杀的打击感
  // 掉落
  const g=Math.round(f.gold*P.goldMul*rewardMul());
  for(let k=0;k<Math.min(g,8);k++)pickups.push({x:f.x+rnd(40)-20,y:f.y+rnd(40)-20,kind:'gold',v:Math.ceil(g/Math.min(g,8))});
  if(Math.random()<(f.elite||f.boss?1:.12))pickups.push({x:f.x,y:f.y,kind:'heart',v:f.boss?40:14});
  if(f.elite||f.boss){
    const cn=f.boss?5:3;
    for(let k=0;k<cn;k++)pickups.push({x:f.x+rnd(60)-30,y:f.y+rnd(60)-30,kind:'crystal',v:f.boss?4:3});
    if(P.flask<(P.flaskMax||2)){P.flask++;toast('✦ 茶壶续上了一杯！');renderSkillHud();}}
  if(P.bFrenzy)P.frenzyT=180;
  if(f.elite||f.boss){
    META.kills[f.fid]=(META.kills[f.fid]||0)+1;saveMeta();
    flash('white');shake();
    stopBgm();victorySting();bgmKind='victory';setTimeout(function(){if(MODE!=='town'&&!musicMuted)startBgm('victory');},1100);
    if(!f.boss)setTimeout(()=>{if(MODE==='run')startBgm(runScene());},1500); // 精英战后回普通曲
    $('#bossbar').classList.remove('on');
    if(f.fid==='hang'&&!f.enraged){unlockChar('wen','在航狂化前击败他');}
    checkUnlocks();
    dropEquip(f.x,f.y,f.boss?2:1,f.boss?1:0.6); // 装备掉落：Boss 必掉，精英 60%
  }
  if(f.boss){
    if(BOSS_UNIQUE[f.fid]&&Math.random()<Math.min(.55,0.20+RUN.ng*0.10)){dropUnique(BOSS_UNIQUE[f.fid],f.x,f.y);setTimeout(function(){toast('★ 头目专属传说掉落！');},300);}
    if(RUN.endless){ // 无尽：头目只是里程碑，继续深入
      gainCrystals(BAL.endlessBossCry);RUN.gold+=Math.round(80*rewardMul());
      dropEquip(f.x,f.y,3,1); // 必掉高档装备
      toast('✦ 第 '+RUN.room+' 层头目击破！裂隙还在加深……');
      setTimeout(()=>{if(MODE==='run')startBgm('endless');},1500);
    }else{RUN.bossDead=true;setTimeout(()=>runVictory(),700);}
  }
}
function hurtPlayer(dm,src){
  if(P.inv>0||P.dashing>0)return;
  let d=Math.round(dm);
  if(src&&MELEE_WPNS.includes(P.wpn))d=Math.round(d*0.8); // 近身搏斗训练：触碰伤害减免
  if(P.cid==='hao')d=Math.max(1,d-2);
  d=Math.max(1,d-(P.tArmor||0)-(P.bArmor||0));
  if(P.shieldHp>0){const ab=Math.min(P.shieldHp,d);P.shieldHp-=ab;d-=ab;
    spawnFloat(P.x,P.y-22,'盾 -'+ab,'#41a6f6');
    if(d<=0){P.inv=14;return;}}
  if(P.hp-d<=0&&P.wolfRevive>0){
    P.wolfRevive--;P.hp=Math.ceil(P.maxhp/2);P.inv=90;
    flash('white');shake();toast('✦ 白狼的守望——它把你引了回来！');
    updateHud();return;}
  P.hp-=d;P.inv=42;RUN&&(RUN.hurt+=d);P.hurtTotal+=d;
  sfx('hurt');
  spawnFloat(P.x,P.y-20,'-'+d,'#ef4d4d',d>=15);
  spawnParts(P.x,P.y,'#ef4d4d',8,3);
  flash('red');if(d>=15)shake();
  if((P.thorn>0||P.cid==='hao')&&src&&src.hp>0){
    damageFoe(src,Math.round(P.thorn+(P.cid==='hao'?d*.5:0)),false);}
  updateHud();
  if(!META.seenFlaskTip&&P.flask>0&&P.hp>0&&P.hp/P.maxhp<0.5){META.seenFlaskTip=1;saveMeta();
    toast(document.body.classList.contains('touch')?'血量偏低 · 轻点右下角茶壶喝一口回血':'血量偏低 · 按 F 喝一口茶壶回血');
    try{var _fb=$('#flaskbtn'),_fs=$('#flasksk');if(_fb)_fb.classList.add('menu-pulse');if(_fs)_fs.classList.add('menu-pulse');setTimeout(function(){if(_fb)_fb.classList.remove('menu-pulse');if(_fs)_fs.classList.remove('menu-pulse');},4200);}catch(e){}}
  if(P.hp<=0)runDefeat();
}
/* ============ 房间通关 / 门牌 ============ */
function mysteryGenMap(){
  var rows=[[{type:'battle',links:[]}]];
  for(var r=1;r<=7;r++){
    var cnt=2+rndi(2),row=[];
    for(var i=0;i<cnt;i++){var x=Math.random();var ty=x<.40?'battle':(x<.58?'treasure':(x<.73?'elite':(x<.88?'event':'shop')));row.push({type:ty,links:[]});}
    rows.push(row);
  }
  rows.push([{type:'boss',links:[]}]);
  for(var r=0;r<rows.length-1;r++){

  if(spl){for(var si=TD.creeps.length-1;si>=0;si--){var sc=TD.creeps[si];if(sc!==t&&Math.hypot(sc.x-tx,sc.y-ty)<spl)tdHitCreep(sc,Math.round(dmg*0.5));}}

/* ============ 主循环 ============ */
function update(){
  frame++;
  if(hitstop>0){hitstop--;return;}                 // 命中冻帧（draw 仍在跑）
  if(!_lowhpEl)_lowhpEl=$('#lowhp');
  if(_lowhpEl){var _vf=(MODE==='run'&&P&&P.maxhp)?P.hp/P.maxhp:1,_v=_vf<0.34?Math.round(Math.min(0.6,(0.34-_vf)/0.34*0.78)*100)/100:0;if(_lowhpEl._o!==_v){_lowhpEl._o=_v;_lowhpEl.style.opacity=_v;}}
  if(MODE==='td'){if(TD&&TD.bannerT>0){TD.bannerT--;if(TD.bannerT<=0){var _bb=document.getElementById('tdbossbanner');if(_bb)_bb.classList.remove('on');}}var _ts=(TD&&TD.spd)||1;for(var _si=0;_si<_ts;_si++){if(!TD)break;tdUpdate();}updateParts();return;}
  if(MODE==='town'||MODE==='run'){
    // 玩家移动
    if(P.dashing>0){moveEntity(P,P.dvx,P.dvy);P.dashing--;P.moving=true;
      if(P.dashing===0&&P.bDash)P.dashBoostT=48;}
    else{const v=inputVec();
      let sp=P.spd*(P.cid==='wen'&&P.hp<P.maxhp*.4?1.15:1)*(P.spdDebuff>0?0.55:1);sp=softCapSpd(sp*moveFeelMul());
      P.moving=!!(v.x||v.y);
      if(v.x||v.y){moveEntity(P,v.x*sp,v.y*sp);if(v.x)P.face=v.x>0?1:-1;}}
    if(P.dashCd>0)P.dashCd--;
    if(P.inv>0)P.inv--;
    if(frame%30===0)unstick(P); // 嵌墙自救
    (_dashboxEl||(_dashboxEl=$('#dashbox'))).classList.toggle('ready',P.dashCd<=0);
    {var _db=$('#dashbtn');if(_db)_db.classList.toggle('cooling',P.dashCd>0);}
    if(P.cid==='yue'&&frame%75===0&&P.hp<P.maxhp){P.hp=Math.min(P.maxhp,P.hp+1);updateHud();}
    if(P.bRegen&&frame%60===0&&P.hp<P.maxhp){P.hp=Math.min(P.maxhp,P.hp+P.bRegen);updateHud();}
    if(P.dashBoostT>0)P.dashBoostT--;
    if(P.frenzyT>0)P.frenzyT--;
  }
  if(MODE==='town'){
    dayT+=0.0006;
    npcs.forEach(updateNpc);npcs=npcs.filter(n=>!n.dead);
    findNearTarget();
    updateWeather();
  }
  if(MODE==='run'){
    foes.forEach(updateFoe);
    autoAttack();updateOrbit();updateHaiPulse();updatePets();
    P.skills.forEach(s=>{if(s.cd>0)s.cd--;});
    if(frame%30===0)renderSkillHud();
    // 冲刺撞击（麒）
    if(P.cid==='qi'&&P.dashing>0){
      foes.forEach(f=>{if(dist(f,P)<f.r+P.r+6)damageFoe(f,Math.round(playerAtk()*.8),false);});}
    // 玩家子弹
    for(let i=shots.length-1;i>=0;i--){const s=shots[i];
      s.x+=s.vx;s.y+=s.vy;s.life--;
      let dead=s.life<=0;
      if(s.bomb&&dead){ // 爆炸
        const rr=70*(P.cid==='yu'?1.4:1)*(P.rangeMul||1);
        slashFx.push({x:s.x,y:s.y,a:0,r:rr,life:12,ring:true});
        spawnParts(s.x,s.y,'#ef7d57',18,5);shake();
        foes.forEach(t=>{if(dist(t,s)<rr+t.r)damageFoe(t,s.dmg.dm,s.dmg.crit);});
      } else if(!s.bomb){
        for(const f of foes){if(Math.hypot(f.x-s.x,f.y-s.y)<f.r+s.r){
          damageFoe(f,s.dmg.dm,s.dmg.crit);
          if(!s.pierce){dead=true;}break;}}

    ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(x,y+f.r-2,f.r*.8,5,0,0,7);ctx.fill();

      ctx.beginPath();ctx.moveTo(x,y);
      ctx.lineTo(x+Math.cos(s.a)*s.r,y+Math.sin(s.a)*s.r);ctx.stroke();
      ctx.strokeStyle='#fff';ctx.lineWidth=3*t+1;
      ctx.beginPath();ctx.moveTo(x,y);
      ctx.lineTo(x+Math.cos(s.a)*s.r,y+Math.sin(s.a)*s.r);ctx.stroke();}
    else if(s.ring){ctx.strokeStyle='#ffcd75';ctx.lineWidth=4;

  }
  drawParts();

  // 小镇昼夜色调
  if(MODE==='town'){

var _prevDrawMode='',_idleF=0;
/* 固定步长模拟：位移/冷却/子弹/计时全按帧计数写的(隐含假设60fps)。低帧率安卓(掉到30fps)会全局半速+抖=玩家反馈的"移动卡"；高刷屏(120Hz)则会超速。
   这里用累加器让 update() 恒定按 60Hz 步进、与渲染帧率解耦：60fps机每帧≈1步、30fps机每帧≈2步、120Hz每2帧1步——游戏速度稳定，无需把全量 x+=vx 改成 x+=vx*dt。 */
var _simAcc=0,_simLast=0;var SIM_STEP=1000/60;
function loop(t){
  {var _edpr=Math.min(devicePixelRatio||1,3);if(innerWidth!==W||innerHeight!==H||_edpr!==DPR)resize();} // 自愈：视口/DPR失同步即重建画布(修偶发"放大"地图bug——iOS旋转/工具栏取到陈旧尺寸时画布与视口错配)
  var _sim=(MODE==='town'||MODE==='run'||MODE==='td');
  if(_sim){
    if(!_simLast)_simLast=t;
    var _el=t-_simLast;_simLast=t;
    if(_el>250)_el=250;                                  // 切后台/长卡顿回来：钳住每帧时长，防一次补太多步(死亡螺旋)
    _simAcc+=_el;var _n=0;
    while(_simAcc>=SIM_STEP&&_n<6){update();_simAcc-=SIM_STEP;_n++;} // 每帧最多补6步，欠太多就丢，绝不越跑越卡
    if(_n>=6)_simAcc=0;
  }else{
    _simLast=0;_simAcc=0;                                 // 离开模拟模式(菜单/弹层)复位，回来不补历史欠帧
    if(_lowhpEl&&_lowhpEl._o){_lowhpEl._o=0;_lowhpEl.style.opacity=0;} // 非战斗时清掉低血暗角
  }
  if(!_goBtnEl)_goBtnEl=$('#goBtn');
  if(_goBtnEl){var _gs=(MODE==='town');if(_goBtnEl._s!==_gs){_goBtnEl._s=_gs;_goBtnEl.style.display=_gs?'inline-flex':'none';document.body.classList.toggle('intown',_gs);}}
  if(MODE!=='town'&&_hintHTML!=='')hideHint(); // 非谷地一律收起交互提示气泡(防泄漏到 run/td/merge/无名谷 战斗页)
  // 省电：仅 town/run/td 逐帧重绘(update在跑,画面在变)；其余菜单/弹层模式画面本就静止(update被跳过),降到~7fps重绘即可,不假死不发热
  if(_sim||MODE!==_prevDrawMode||(_idleF++&7)===0)draw();
  _prevDrawMode=MODE;
  requestAnimationFrame(loop);
}

function rerollEquipped(slot){ // 重铸：结晶洗词缀（保留稀有度与槽位）

/* ============ 存档转移：导出/导入码（微信↔浏览器搬家） ============ */
function _b64e(x){return btoa(unescape(encodeURIComponent(x)));}
function _b64d(b){return decodeURIComponent(escape(atob(b)));}
function _sum(x){let h=5381;for(let i=0;i<x.length;i++)h=((h<<5)+h+x.charCodeAt(i))>>>0;return h.toString(36);}
function exportSave(){saveMeta();const j=JSON.stringify(META);return 'MYSKME1.'+_sum(j)+'.'+_b64e(j);}
function parseSave(code){
  code=(code||'').replace(/\s+/g,'');
  if(code.indexOf('MYSKME1.')!==0)throw new Error('这不是有效存档码（需以 MYSKME1 开头）');
  const p=code.split('.');if(p.length<3)throw new Error('存档码不完整');
  let j;try{j=_b64d(p.slice(2).join('.'));}catch(e){throw new Error('存档码已损坏，无法解码');}
  if(_sum(j)!==p[1])throw new Error('校验失败——复制时可能漏了字符');
  let m;try{m=JSON.parse(j);}catch(e){throw new Error('存档数据解析失败');}
  if(!m||!m.unlocked)throw new Error('存档内容无效（缺少角色解锁记录）');
  return j;
}

function _smsg(t,c){const e=$('#saveMsg');if(e){e.textContent=t;e.style.color=c;}}
function copySaveCode(){
  const t=$('#saveOut');if(!t)return;t.focus();t.select();try{t.setSelectionRange(0,99999);}catch(e){}
  const ok=()=>_smsg('✓ 已复制——到新设备粘贴到下方 ② 即可导入','#38b764');
  const fail=()=>_smsg('复制失败，请长按上方文本手动全选复制','#ef8d8d');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t.value).then(ok,()=>{try{document.execCommand('copy')?ok():fail();}catch(e){fail();}});
  }else{try{document.execCommand('copy')?ok():fail();}catch(e){fail();}}
}
function doImportSave(){
  const inp=$('#saveIn');if(!inp)return;
  let json;
  try{json=parseSave(inp.value);}catch(e){_impArmed=false;_smsg('✕ '+e.message,'#ef8d8d');return;}
  if(!_impArmed){_impArmed=true;_smsg('⚠ 校验通过！再点一次「粘贴并导入」确认——当前进度将被永久覆盖','#ffcd75');return;}
  try{
    localStorage.setItem(SAVEKEY,json); // 写入后用 loadMeta 跑旧档迁移补全字段
    META=loadMeta();saveMeta();
  }catch(e){_smsg('✕ 写入失败：'+e.message,'#ef8d8d');return;}
  _impArmed=false;
  // 身份归属：同一人换机（保留云身份）vs 别人分享给我（换新身份，免得撞云存档/排行榜）
  const _m=$('#saveMsg');
  if(_m){_m.style.color='#cdd6e6';_m.innerHTML=IZ('✓ 导入成功！这份存档来自——<div style="display:flex;gap:7px;margin-top:8px"><button class="pbtn alt" style="flex:1;margin:0;font-size:11px;padding:8px 6px" onclick="finishImport(false)">我自己的另一台设备</button><button class="pbtn" style="flex:1;margin:0;font-size:11px;padding:8px 6px" onclick="finishImport(true)">别人分享给我的</button></div><div style="margin-top:6px;font-size:10px;color:var(--ink3);line-height:1.5">选「别人分享」会换一个云身份，免得和原主在云存档/排行榜上互相覆盖</div>');}
  else finishImport(false);
}
function finishImport(fresh){
  if(fresh){try{META.lbId=lbNewId();META.lbToken='';saveMeta();}catch(e){}}
  _smsg('✓ 正在重新载入游戏……','#38b764');
  setTimeout(()=>{try{location.reload();}catch(e){}},700);
}

/* ============ 裂隙叠光 · 2048 式合成（休闲/全民向，复用稀有度配色 + 金叶奖励 + 叠光榜） ============ */

  if(!_mg||_mg.over||_mg.choice)return false;

const MERGE_BOONS=[{k:'shuffle',n:'洗牌',d:'打乱整盘 ×1'},{k:'up',n:'升阶',d:'选一格升一档 ×1'},{k:'rm',n:'碎晶',d:'选一格清掉 ×1'},{k:'mul',n:'双倍分',d:'下 8 次合成 ×2 分'}];

function sysShare(){ // 系统分享面板（支持才显示；失败提示长按）

    const f=new File([b],'MYSKME战绩.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[f]}))
      return navigator.share({files:[f],title:'MYSKME 远征录'});
    throw 0;
  }).catch(()=>toast('该浏览器不支持直接分享——长按图片即可'));
}
function closeTrophy(prev){

/* ============ 离线挂机收益（谷地替你攒钱） ============ */
function offlineIncome(){
  const now=Date.now(),dt=now-(META.lastTs||now);
  META.lastTs=now;saveMeta();
  if(dt<10*60*1000)return; // 10 分钟以上才算
  const hours=Math.min(12,dt/3600000); // 上限 12 小时
  const rate=Math.min(110,5+Object.values(META.bld).reduce((a,x)=>a+x,0)*3+Object.keys(META.decor).length*4
    +(catLv()>=2?3:0)); // 离线时薪封顶 110🍂/h
  const gold=Math.round(hours*rate);
  if(gold<=0)return;
  META.gold+=gold;
  const cry=META.decor.statue?Math.round(hours):0;
  if(cry)META.crystals+=cry;
  const bonus=offlineSurprise(hours,gold); // 惊喜彩袋：随机·有期待·已封顶（防刷）
  saveMeta();
  setTimeout(()=>{
    toast('✦ 离线收益 · 谷地替你攒了 '+gold+'🍂'+(cry?' +'+cry+'💠':'')+'（'+hours.toFixed(1)+' 小时）');
    if(bonus&&bonus.msg)setTimeout(()=>{toast(bonus.msg);if(typeof sfx==='function')sfx('legend');},1600);
  },800);
}
function offlineSurprise(hours,gold){ // 离线归来随机惊喜：常见小利→偶发横财，全部封顶
  if(hours<0.5)return null;
  const luck=Math.min(1,hours/12),roll=Math.random();
  if(roll<0.40){const g=Math.round(gold*(0.3+Math.random()*0.5))+8;META.gold+=g;return {msg:'✦ 惊喜 · 谷地角落翻出 '+g+'🍂'};}
  if(roll<0.62){const c=1+Math.floor(Math.random()*(2+luck*3));META.crystals+=c;return {msg:'✦ 惊喜 · 逆季茶圃结了 '+c+'💠'};}
  if(roll<0.80){const e=Math.round((20+Math.random()*40)*(1+luck));gainExp(e);return {msg:'✦ 惊喜 · 信鸽捎回 '+e+' 经验'};}
  if(roll<0.93){const rar=(luck>0.6&&Math.random()<0.35)?3:2;const it=makeItemOfRar(rar);gainItem(it,true);return {msg:'✦ 惊喜 · 谷地拾得 '+((RARS[rar]&&RARS[rar].name)||'装备')+'「'+it.name+'」'};}
  const jack=Math.round(60+hours*12+Math.random()*90),jc=2+Math.floor(Math.random()*4);META.gold+=jack;META.crystals+=jc;
  return {msg:'★ 罕见 · 狼先生留下一袋酬金 '+jack+'🍂 +'+jc+'💠'};
}
